<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LI SN Fixer</title>
    <style>
        body {
            width: 260px;
            padding: 12px;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            color: #555;
        }
        select {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            padding: 5px;
            margin-bottom: 4px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 11px;
            resize: vertical;
        }
        #urlCount {
            font-size: 11px;
            color: #555;
            margin-bottom: 10px;
        }
        #saveBtn {
            width: 100%;
            padding: 7px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }
        #saveBtn:hover {
            background-color: #45a049;
        }
        #savedConfirmation {
            color: green;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            display: none;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <h3>LI SN Fixer Settings</h3>

    <label for="leadURLs">Lead URLs (one per line)</label>
    <textarea id="leadURLs" rows="6" placeholder="Paste URLs here, one per line"></textarea>
    <div id="urlCount">URLs: 0</div>

    <label for="country">LI Country</label>
    <select id="country">
        <option value="UK">UK</option>
        <option value="United States">United States</option>
    </select>

    <label for="profession">LI Profession</label>
    <select id="profession">
        <option value="project manager">Project Manager</option>
    </select>

    <button id="saveBtn" type="button">Save</button>
    <div id="savedConfirmation">Saved!</div>

    <script src="popup.js"></script>
</body>
</html>
