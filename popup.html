<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LI SN Fixer</title>
    <style>
        body {
            width: 260px;
            padding: 12px;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        h3 {
            margin: 0 0 10px;
            font-size: 14px;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 3px;
            font-weight: bold;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 13px;
        }
        .saved-msg {
            color: green;
            font-size: 11px;
            display: none;
            margin-top: -6px;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <h3>LI SN Fixer Settings</h3>

    <label for="importNumber">Last LI Import Number</label>
    <input type="number" id="importNumber" min="0" placeholder="e.g. 42">
    <div class="saved-msg" id="importNumberSaved">Saved</div>

    <label for="country">LI Country</label>
    <select id="country">
        <option value="UK">UK</option>
        <option value="United States">United States</option>
    </select>
    <div class="saved-msg" id="countrySaved">Saved</div>

    <label for="profession">LI Profession</label>
    <select id="profession">
        <option value="project manager">Project Manager</option>
    </select>
    <div class="saved-msg" id="professionSaved">Saved</div>

    <script src="popup.js"></script>
</body>
</html>
